name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'master'
          cache: true

      - name: Create config files
        run: |
          mkdir -p lib/core/config
          echo "const geminiApiKey = '';" > lib/core/config/api_keys.dart
          echo "const supabaseUrl = ''; const supabaseAnonKey = '';" > lib/core/config/supabase_config.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
